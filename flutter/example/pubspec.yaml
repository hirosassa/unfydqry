name: unfydqry_example
description: Flutter sample app demonstrating the unfydqry plugin.
publish_to: none
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  # Use the local plugin from the monorepo.
  unfydqry:
    path: ../
  path_provider: ^2.1.0

flutter:
  uses-material-design: true
