name: Flutter Tests

on:
  push:
    branches: [feat/flutter]
    paths:
      - "flutter/**"
      - ".github/workflows/flutter-tests.yml"
  pull_request:
    paths:
      - "flutter/**"
      - ".github/workflows/flutter-tests.yml"
  workflow_dispatch:

jobs:
  dart-test:
    name: flutter test (Dart unit tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Show Flutter version
        run: flutter --version

      - name: flutter pub get
        working-directory: flutter
        run: flutter pub get

      - name: flutter test
        working-directory: flutter
        run: flutter test --reporter expanded    # 11 cases (mock method channel)

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flutter-test-output
          path: flutter/build/
          if-no-files-found: ignore
