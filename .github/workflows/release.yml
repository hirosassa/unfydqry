name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to create (e.g. 0.2.0)"
        required: true
        type: string

jobs:
  tag:
    name: Create tag and trigger release workflows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Expected version of the form MAJOR.MINOR.PATCH[-prerelease], got: $VERSION" >&2
            exit 1
          fi

      - name: Fail if tag already exists
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git ls-remote --tags origin "refs/tags/${VERSION}" | grep -q .; then
            echo "Tag ${VERSION} already exists on origin." >&2
            exit 1
          fi

      - name: Create and push tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${VERSION}" -m "${VERSION}"
          git push origin "refs/tags/${VERSION}"
