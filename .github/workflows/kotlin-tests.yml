name: Kotlin Tests

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "android/sample/unifiedquery/**"
      - "android/sample/build.gradle.kts"
      - "android/sample/settings.gradle.kts"
      - "android/sample/gradle.properties"
      - "spec/**"
      - ".github/workflows/kotlin-tests.yml"
  pull_request:
    paths:
      - "core/**"
      - "android/sample/unifiedquery/**"
      - "android/sample/build.gradle.kts"
      - "android/sample/settings.gradle.kts"
      - "android/sample/gradle.properties"
      - "spec/**"
      - ".github/workflows/kotlin-tests.yml"
  workflow_dispatch:

jobs:
  kotlin-test:
    name: gradle :unifiedquery:test on macOS arm64
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: core

      - name: Build Rust cdylib for macOS arm64
        working-directory: core
        # Produces libunfydqry.dylib that JNA can load.
        # build.gradle.kts passes target/aarch64-apple-darwin/release/ as jna.library.path.
        run: cargo build --release --target aarch64-apple-darwin

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Verify Kotlin binding is in sync with Rust
        # コミット済みの Kotlin バインディングが、現在の Rust 実装から再生成される
        # ものと一致することを確かめる(ドリフト検出)。
        # uniffi-bindgen は cwd で `cargo metadata` を呼ぶので core/ で実行する。
        working-directory: core
        run: |
          set -eux
          cargo run --bin uniffi-bindgen -- generate \
            --library target/aarch64-apple-darwin/release/libunfydqry.dylib \
            --language kotlin \
            --out-dir generated/kotlin
          diff -u \
            ../android/sample/unifiedquery/src/main/kotlin/uniffi/unfydqry/unfydqry.kt \
            generated/kotlin/uniffi/unfydqry/unfydqry.kt

      - name: gradle :unifiedquery:test
        working-directory: android/sample
        run: gradle :unifiedquery:test --info

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kotlin-test-reports
          path: |
            android/sample/unifiedquery/build/reports/tests/test/
            android/sample/unifiedquery/build/test-results/test/
          if-no-files-found: ignore
