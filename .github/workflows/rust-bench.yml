name: Rust Benchmarks

on:
  pull_request:
    paths:
      - "core/**"
      - ".github/workflows/rust-bench.yml"
  workflow_dispatch:

# Only the latest run per PR matters; cancel superseded ones.
concurrency:
  group: rust-bench-${{ github.ref }}
  cancel-in-progress: true

# Stage 1 runs untrusted PR code, so it gets a read-only token and never
# touches the PR. The bench report is handed to the privileged "comment"
# workflow (workflow_run) via an artifact, which is what lets fork PRs get a
# comment without exposing a write token to untrusted code.
permissions:
  contents: read

# Shared across every job:
# - CRITERION_ARGS: shorter measurement/warm-up than Criterion's defaults —
#   shared CI runners are noisy, so this trades absolute precision for a usable
#   wall-clock time. Enough to surface regressions, not to publish absolute
#   numbers.
# - BENCH_DOC_COUNTS: drops the heavy 10k corpus tier in CI (read by the bench
#   helpers); local runs omit the var and keep the full set.
# - BENCHES: the four Criterion (harness = false) bench targets, listed
#   explicitly rather than via --benches so the libtest harness on the lib/bin
#   targets — which doesn't understand --save-baseline — is never invoked.
env:
  CRITERION_ARGS: "--measurement-time 2 --warm-up-time 1"
  BENCH_DOC_COUNTS: "100,1000"
  BENCHES: "--bench search --bench index --bench normalize --bench highlight"

jobs:
  # The PR head and the base commit are benched in parallel on separate runners,
  # each compiling and benchmarking once, then a tiny compare job diffs the two
  # saved baselines. This halves the wall-clock vs. benching both serially in one
  # job (with a git checkout + recompile in between). The trade-off is that the
  # two baselines come from different runners, so cross-machine noise is added on
  # top of the usual CI noise — hence the "<10% is noise" disclaimer below.
  bench-pr:
    name: bench PR head
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: core

      - name: Bench PR
        working-directory: core
        run: cargo bench $BENCHES -- --save-baseline pr $CRITERION_ARGS

      - name: Upload PR baseline
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: criterion-pr
          path: core/target/criterion
          retention-days: 7

  bench-base:
    name: bench base commit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # The comparison only makes sense for PRs; workflow_dispatch has no base.
    if: github.event_name == 'pull_request'
    steps:
      # The base commit is immutable, so its baseline only changes when the PR's
      # target branch advances. Key the cache on base.sha: pushing new commits to
      # the PR reuses it and skips the (re)compile + bench of the base entirely.
      - name: Restore base baseline cache
        id: cache-base
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: core/target/criterion
          key: criterion-base-${{ github.event.pull_request.base.sha }}-${{ env.BENCH_DOC_COUNTS }}-${{ hashFiles('.github/workflows/rust-bench.yml') }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.cache-base.outputs.cache-hit != 'true'
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Install Rust stable
        if: steps.cache-base.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Cache cargo
        if: steps.cache-base.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: core

      # The base branch may predate the benchmarks (or a given bench). Don't fail
      # the pipeline in that case — the compare job just won't find a baseline.
      - name: Bench base
        if: steps.cache-base.outputs.cache-hit != 'true'
        working-directory: core
        continue-on-error: true
        run: cargo bench $BENCHES -- --save-baseline base $CRITERION_ARGS

      - name: Upload base baseline
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: criterion-base
          path: core/target/criterion
          retention-days: 7
          # Base predating the benches leaves no criterion output — that's fine.
          if-no-files-found: ignore

  compare:
    name: criterion compare (PR vs base)
    runs-on: ubuntu-latest
    needs: [bench-pr, bench-base]
    if: github.event_name == 'pull_request'
    steps:
      - name: Download PR baseline
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: criterion-pr
          path: core/target/criterion

      # May be absent when the base predates the benches; tolerate it.
      - name: Download base baseline
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: criterion-base
          path: core/target/criterion

      # Prebuilt binary — avoids compiling critcmp from source on every run.
      - name: Install critcmp
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: critcmp

      - name: Build comparison report
        working-directory: core
        run: |
          {
            echo "## Criterion benchmark comparison"
            echo ""
            echo "PR \`${{ github.event.pull_request.head.sha }}\` vs base \`${{ github.event.pull_request.base.sha }}\`."
            echo "_Measured with \`$CRITERION_ARGS\` (corpus sizes \`$BENCH_DOC_COUNTS\`) on shared CI runners — PR and base run on separate runners, so treat small (<10%) deltas as noise._"
            echo ""
            if [ -z "$(find target/criterion -type d -name base -print -quit 2>/dev/null)" ]; then
              echo "> ⚠️ Could not benchmark the base commit (it may predate these benchmarks). No comparison available."
            else
              echo '```'
              # critcmp lists every group; the threshold only colours/orders
              # output, it does not hide rows. Full table for the reviewer.
              critcmp base pr
              echo '```'
            fi
          } > "$RUNNER_TEMP/report.md"
          # Mirror to the job summary too, so the numbers are visible directly
          # on this run even before the comment workflow posts them.
          cat "$RUNNER_TEMP/report.md" >> "$GITHUB_STEP_SUMMARY"

      # The PR number isn't available to the workflow_run event, so pass it
      # alongside the report. (pull_request.number is empty for workflow_dispatch,
      # which simply yields no comment downstream.)
      - name: Record PR number
        run: echo "${{ github.event.pull_request.number }}" > "$RUNNER_TEMP/pr-number.txt"

      - name: Upload report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-report
          path: |
            ${{ runner.temp }}/report.md
            ${{ runner.temp }}/pr-number.txt
          retention-days: 7
